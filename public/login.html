<!--Essa é a página utilizada para a escola logar no painel de gestão interna do site-->
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Icon Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="shortcut icon" href="./imgs_site/logo.png" type="image/x-icon" />
  </head>
  <body>
    <main>
      <div id="container">
        <div id="info">
          <img
            src="./imgs/logojpwhite.png"
            alt="Logo da escola na cor branca, com o símbolo abstrato."
          />
          <h1>Boas Vindas!</h1>
          <p>O conhecimento nos faz valer.</p>
        </div>
      </div>

      <div id="tela_login">
        <i class="fa-regular fa-user fa-4x"></i>

        <input type="email" id="email" placeholder="E-mail" />
        <input type="password" id="senha" placeholder="Senha" />
        <button type="button" id="btn-esqueci">Esqueci minha senha / Redefina sua Senha</button>

        <!-- Tag de redefinição vai mudar provavelmente pra link ou botao mas por enquanto vai ficar assim -->
        <button type="button" id="btn-login">Entrar</button>
        <p id="erro" style="color: red; display: none">
          E-mail ou senha inválidos
        </p>
      </div>

      <div id="modal-esqueci" style="display:none;">
  <div id="modal-conteudo">
    <h2>Redefinir senha</h2>
    <p>Se você tiver uma conta, receberá um e-mail com o link de redefinição.</p>
    <input type="email" id="email-redefinir" placeholder="Seu e-mail" />
    <p id="msg-sucesso" style="display:none; color:green;">E-mail enviado! Verifique sua caixa de entrada.</p>
    <p id="msg-erro-modal" style="display:none; color:red;">E-mail inválido.</p>
    <button type="button" id="btn-enviar-reset">Enviar</button>
    <button type="button" id="btn-fechar-modal">
  <i class="fa-solid fa-xmark"></i>
</button>
  </div>
    </div>


      <!-- JS -->
      <script type="module" src="/script-login.js"></script>

      <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
          <div class="vw-plugin-top-wrapper"></div>
        </div>
      </div>
      <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
      <script>
        new window.VLibras.Widget("https://vlibras.gov.br/app");
      </script>

      <!--<script src="carrossel.js"></script>-->

      <script
        src="https://cdn.userway.org/widget.js"
        data-account="PhHQuLEkH6"
        id="userway-root"
      ></script>
    </main>
  </body>
</html>
