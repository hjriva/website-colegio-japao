<!--Essa é a página utilizada para a escola logar no painel de gestão interna do site-->
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Icon Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

  </head>
  <body>
    <main>
      <div id="container">
        <div id="info">
          <img src="./imgs/logojpwhite.png" alt="Logo Japão" />
          <h1>Bem-Vindo!</h1>
          <p>O conhecimento nos faz valer.</p>
        </div>
      </div>

      <div id="tela_login">
        <i class="fa-regular fa-user fa-4x"></i>

        <input type="email" id="email" placeholder="E-mail" />
        <input type="password" id="senha" placeholder="Senha" />
        <p id="redefinicao">Esqueci a Senha / Redefina sua Senha</p>
        <!-- Tag de redefinição vai mudar provavelmente pra link ou botao mas por enquanto vai ficar assim -->
        <button type="button" id="btn-login">Entrar</button>
        <p id="erro" style="color: red; display: none">
          E-mail ou senha inválidos
        </p>
      </div>

      <!-- JS -->
      <script type="module" src="/script-login.js"></script>
    </main>
  </body>
</html>
