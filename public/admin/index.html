<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img {
            height: 100px;
            width: 100px    ;
        }

        #nova-atividade {
            display: none;
        }


    </style>

    <link rel="stylesheet" href="index.css">
</head>
<body>
    <input type="button" value="Sair" id="SairBotao"> <!--Precisa desse id devido ao JavaScript-->
    <h1>Bem vindo</h1>
    <button id="mostrar-painel-agenda">Painel da agenda</button>
    <button id="mostrar-painel-atv">Painel de atividades</button>
    <button id="mostrar-painel-usuarios">Painel de usuários</button>

<div id="painel-admin">

    <div id="painel-agenda-conteudo">
        <h2>Painel de controle da agenda</h2>
        <button id="adicionar-post">Adicionar postagens</button>

        <div id="novo-evento-form">
            <h2>Adicionar novo post:</h2>
            <form action="/updateBD" method="POST" id='FormularioNovo'>
                <input type="text" name="nome-evento" id="nome-novo-evento" placeholder="Nome">
                <br> <br>
                <input type="date" name="" id="data-novo-evento"> <br> <br>
                <input type="time" name="" id="hora-novo-evento"> <br> <br>

                
                <input type="checkbox" id="destaque">

                <input type="file" name="" id="imagem-novo-evento" accept="image/*">
                <br><br>
                <textarea name="" id="desc-novo-evento" placeholder="Descricao"></textarea>
                <br><br><br><br>
            </form>
            <input type="button" value="Criar nova postagem" id="salvar-post">
        </div>

        <input type="text" id="input-busca" placeholder="Buscar por título ou descrição...">
        <input type="date" id="filtro-data">

        <div id="controle-agenda">
            <!--Aqui é onde vão aparecer os eventos-->
        </div>

        <button id="btn-anterior-interno">← Anterior</button>
        <span id="info-pagina-interna"></span>
        <button id="btn-proximo-interno">Próximo →</button>
    </div>

    <div id="painel-atividades-conteudo" style="display:none">
        <h2>Painel de atividades</h2>
        <input type="button" value="Adicionar novo quiz" id="novo-quiz-toggle">
            <div id="nova-atividade">
<!--Informações principais sobre o quiz, antes das perguntas: nome e disciplina -->
<form action=""  id="cabecalho-quiz"> 
    <label for="nome-atividade">Nome da atividade: </label>
    <input type="text" name="nome-atividade" id="nome-atividade">
    <label for="input-disciplina">Disciplina:</label>
    <input list="disciplinas-dl" name="input-disciplina" id="input-disciplina">
    <datalist id="disciplinas-dl">
        <!--Opções adicionadas dinamicamente com js-->
    </datalist>

    <input type="checkbox" id="randomizar" name="random">
    <label for="randomizar">Embaralhar</label>
</form>


<main id="formulario_perguntas"> <!--Aqui são gerados os formulários para criar as perguntas-->
    <div id="form-pergunta-1" class="perguntas_teste"> 
        <!--Div modelo para outros formulários gerados dinamicamente com JS-->
      <form action="" class="form_pergunta" id="form_1"> <!--Talvez não precise de action, ver posteriormente-->
        
        <span class="numero-pergunta">1&#41;</span>
        <label for="question1">Pergunta:</label>
        <input type="text" name="enunciado-1" id="enunciado-1" class="input_enunciado">

        <div class="campo"> <!--Essa div existe para conseguirmos deixar uma pergunta embaixo da outra 
            sem encher de br,
            provavelmente vai ser adicionado em outros elementos -->
        <label for="alt-a-1"> a&#41; </label>
        <input type="text" name="alt-a" class="alt-a" id="alt-a-1"> 
        <!--O id desses inputs precisa ter um número, pois serão gerados mais deles dinamicamente
        para serem unicos -->
        <input type="radio" name="radio-alternativa" value="a">
        <!--O value do radio precisa ser a letra da alternativa, para conseguirmos armazenar a opção correta de cada pergunta.-->
        </div>

        <div class="campo">
        <label for="alt-b-1"> b&#41; </label>
        <input type="text" name="alt-b" class="alt-b" id="alt-b-1">
        <input type="radio" name="radio-alternativa" value="b">
        </div>

        <div class="campo">
        <label for="alt-c"> c&#41; </label>
        <input type="text" name="alt-c" class="alt-c" id="alt-c-1">
        <input type="radio" name="radio-alternativa" value="c">
        </div>

        <div class="campo">
        <label for="alt-d"> d&#41; </label>
        <input type="text" name="alt-d" class="alt-d" id="alt-d-1">
        <input type="radio" name="radio-alternativa" value="d">
        </div>

        <div class="campo">
            <textarea name="explicacao-1" id="explicacao-1" class="explicacao-text" placeholder="Explicacao opcional">

            </textarea>
        </div>
    </form>
</div> 
   
</main>    
<button id="add-pergunta">+</button> 
<button id="salvar_quiz">Salvar</button>
</div>

 <div id="controle-atividades"></div>

   

</div>

     <div id="painel-usuarios-conteudo" style="display:none">
        <h2>Painel de usuários</h2>
        <label for="add-novo-usuario">E-mail do usuário: </label>
        <input type="text" id="add-novo-usuario"> 
        <input type="button" value="adicionar usuario" id="adicionar-usuario-botao">
        <!-- futuro -->
    </div>

</div>


    <script type="module" src="agenda_admin.js"></script>
    <script type="module" src="script-fb.js"></script>


    
</body>
</html>
