<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Disciplina</title>
</head>
<body>
    <h1 id="titulo"></h1>
    <ul id="lista-atividades"></ul>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        fetch(`/disciplina/${id}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('titulo').innerText = data.disciplina.nome_disc;

                const lista = document.getElementById('lista-atividades');
                data.atividades.forEach(atv => {
                    const li = document.createElement('li');

                    // define o link dependendo do tipo
                    const href = atv.tipo === 'quiz'
                        ? `/atividades/quiz.html?id=${atv.quiz_id}`
                        : atv.caminho;

                    li.innerHTML = `<a href="${href}">${atv.titulo}</a>`;
                    lista.appendChild(li);
                });
            })
            .catch(err => console.error(err));
    </script>
</body>
</html>
